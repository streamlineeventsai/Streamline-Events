<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Streamline Events</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <nav><!-- your navbar --></nav>
    
    <div class="container">
        <h2>Event Registration</h2>
        <form id="registrationForm">
            <div>
                <input type="text" id="fullname" placeholder="Full Name" required>
                <div class="error" id="nameError"></div>
            </div>
            <div>
                <input type="email" id="email" placeholder="Email" required>
                <div class="error" id="emailError"></div>
            </div>
            <div>
                <input type="tel" id="phone" placeholder="Phone (03xxxxxxxxx)" required>
                <div class="error" id="phoneError"></div>
            </div>
            <div>
                <select id="event" required>
                    <option value="">Select Event</option>
                    <option value="Tech Conference 2026">Tech Conference 2026 - 1500 PKR</option>
                    <option value="AI Workshop">AI Workshop - 1000 PKR</option>
                    <option value="Networking Night">Networking Night - 500 PKR</option>
                </select>
                <div class="error" id="eventError"></div>
            </div>
            <div>
                <input type="text" id="fee" readonly placeholder="Fee will appear here">
            </div>
            <div>
                <label>
                    <input type="checkbox" id="agree" required>
                    I confirm I will pay the registration fee
                </label>
                <div class="error" id="agreeError"></div>
            </div>
            <button type="submit" id="submitBtn">Register Now</button>
        </form>
    </div>

    <script>
        // Fee update on event selection
        const eventSelect = document.getElementById('event');
        const feeInput = document.getElementById('fee');
        const feeMap = {
            'Tech Conference 2026': '1500 PKR',
            'AI Workshop': '1000 PKR',
            'Networking Night': '500 PKR'
        };
        eventSelect.addEventListener('change', () => {
            feeInput.value = feeMap[eventSelect.value] || '';
        });

        // Webhook URL
        const WEBHOOK_URL = 'https://hook.eu1.make.com/r6rcpxdpzrtk8sgr6b7o5xoe6wjc1qyb';

        // Form submission
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.innerText = '');
            
            // Get values
            const name = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const event = eventSelect.value;
            const agree = document.getElementById('agree').checked;
            const fee = feeInput.value;
            
            let isValid = true;
            
            // Validation
            if (name.length < 3 || !/^[A-Za-z\s]+$/.test(name)) {
                document.getElementById('nameError').innerText = 'Valid name (min 3 letters) required';
                isValid = false;
            }
            if (!/^\S+@\S+\.\S+$/.test(email)) {
                document.getElementById('emailError').innerText = 'Valid email required';
                isValid = false;
            }
            if (!/^03[0-9]{9}$/.test(phone)) {
                document.getElementById('phoneError').innerText = 'Phone must be 03xxxxxxxxx (11 digits)';
                isValid = false;
            }
            if (!event) {
                document.getElementById('eventError').innerText = 'Select an event';
                isValid = false;
            }
            if (!agree) {
                document.getElementById('agreeError').innerText = 'You must agree to pay fee';
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Generate RegID and QR
           
            // RegID generate karo
const regId = 'REG-' + Date.now() + '-' + Math.floor(Math.random() * 1000);

// QR code URL – sahi format mein
const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(regId)}&size=150x150`;
            
            // Save to localStorage
            const registrations = JSON.parse(localStorage.getItem('registrations') || '[]');
            registrations.push({
                regId, name, email, phone, eventName: event, fee, qrCodeUrl: qrUrl,
                paymentStatus: 'Pending', timestamp: new Date().toISOString()
            });
            localStorage.setItem('registrations', JSON.stringify(registrations));
            
            // Prepare webhook data
            const payload = { name, email, phone, event, fee: fee.replace(' PKR','') };
            
            // Send to webhook
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const text = await response.text();
                if (response.ok) {
                    alert('Registration successful! Check email for QR code (demo).');
                } else {
                    alert('Registration saved locally but automation failed. Please contact support.');
                }
            } catch (error) {
                console.error('Webhook error:', error);
                alert('Registration saved locally but automation failed. Please try again later.');
            }
            
            // Reset form
            document.getElementById('registrationForm').reset();
            feeInput.value = '';
        });
    </script>
</body>
</html>
